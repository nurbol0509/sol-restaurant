<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Доставка | SOL</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .cart { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 30px; }
        .dish button { background: #ff9800; color: #000; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .quantity-btn { background: #333; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .order-form input, .order-form textarea {
            width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; 
            border-radius: 8px; color: white; font-size: 16px;
        }
        .submit-order-btn {
            width: 100%; padding: 16px; background: #ff9800; color: #000; 
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body class="menu-page">

<header class="header">
    <div class="logo">SOL</div>
</header>

<main class="menu-container">
    <h1> Доставка SOL — Корей асханасы</h1>

    <!-- Поиск + Дауыс -->
    <div class="search-box">
        <input type="text" id="menuSearch" onkeyup="searchDish()" placeholder="Тағам атын іздеңіз...">
        <button onclick="voiceSearch()" class="voice-btn">🎤</button>
    </div>

    <!-- Категория батырмалары -->
    <div class="category-tabs">
        <button onclick="scrollToCategory('hot')" class="cat-btn active">Ыстық тағамдар</button>
        <button onclick="scrollToCategory('soups')" class="cat-btn">Сорпалар</button>
        <button onclick="scrollToCategory('appetizers')" class="cat-btn">Тіскебасарлар</button>
        <button onclick="scrollToCategory('salads')" class="cat-btn">Салаттар</button>
        <button onclick="scrollToCategory('desserts')" class="cat-btn">Тәттілер</button>
        <button onclick="scrollToCategory('drinks')" class="cat-btn">Сусындар</button>
    </div>

    <!-- ==================== ЫСТЫҚ ТАҒАМДАР (7) ==================== -->
    <h2 id="hot" class="category-title">Ыстық тағамдар</h2>
    <div class="dishes" id="hot-dishes"></div>

    <!-- ==================== СОРПАЛАР (6) ==================== -->
    <h2 id="soups" class="category-title">Сорпалар</h2>
    <div class="dishes" id="soups-dishes"></div>

    <!-- ==================== ТІСКЕБАСАРЛАР (6) ==================== -->
    <h2 id="appetizers" class="category-title">Тіскебасарлар</h2>
    <div class="dishes" id="appetizers-dishes"></div>

    <!-- ==================== САЛАТТАР (6) ==================== -->
    <h2 id="salads" class="category-title">Салаттар</h2>
    <div class="dishes" id="salads-dishes"></div>

    <!-- ==================== ТӘТТІЛЕР (5) ==================== -->
    <h2 id="desserts" class="category-title">Тәттілер</h2>
    <div class="dishes" id="desserts-dishes"></div>

    <!-- ==================== СУСЫНДАР (5) ==================== -->
    <h2 id="drinks" class="category-title">Сусындар</h2>
    <div class="dishes" id="drinks-dishes"></div>

    <!-- ==================== КОРЗИНА ==================== -->
    <div class="cart">
        <h2>Себет <span id="cartCount">(0)</span></h2>
        <div id="cartItems"></div>
        <h3>Жалпы сома: <span id="totalPrice">0</span> тг</h3>
    </div>

    <!-- ==================== ОФОРМИТЬ ЗАКАЗ ==================== -->
    <div class="order-form">
        <h2 style="color:#ff9800; text-align:center;">Оформить заказ</h2>
        <form id="orderForm">
            <input type="text" id="name" placeholder="Аты-жөніңіз" required>
            <input type="tel" id="phone" placeholder="Телефон нөмірі" required>
            <input type="email" id="email" placeholder="Email (чек келеді)" required>
            <input type="text" id="address" placeholder="Мекенжайыңыз" required>
            <textarea id="comment" rows="3" placeholder="Қосымша тілектер..."></textarea>
            
            <button type="button" onclick="placeOrder()" class="submit-order-btn">
                ЗАКАЗ БЕРУ
            </button>
        </form>
    </div>
</main>

let cart = [];

// ==================== РЕНДЕР ФУНКЦИЯСЫ ====================
function renderAllDishes() {
    const categories = ['hot','soups','appetizers','salads','desserts','drinks'];
    
    categories.forEach(cat => {
        const container = document.getElementById(cat + '-dishes');
        if (!container) return;
        container.innerHTML = '';

        const filtered = allDishes.filter(d => d.category === cat);
        filtered.forEach(d => {
            const div = document.createElement("div");
            div.className = "dish";
            div.innerHTML = `
                <img src="${d.img}" alt="${d.name}">
                <h3>${d.name} <span class="price">${d.price} ₸</span></h3>
                <button onclick="addToCart('${d.name}', ${d.price})">Себетке қосу</button>
            `;
            container.appendChild(div);
        });
    });
}

// Қалған функциялар (addToCart, updateCart, placeOrder және т.б.) бұрынғы кодыңыздан қалды

renderAllDishes();
